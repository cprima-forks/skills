experiment_id: skill-tests-integration
description: "Integration tests — longer timeouts for complex multi-step scenarios"

defaults:
  run_limits:
    max_turns: 30
    task_timeout: 900
    turn_timeout: 300

  agent:
    type: claude-code
    permission_mode: acceptEdits
    model: claude-sonnet-4-6
    allowed_tools: ["Skill", "Bash", "Read", "Write", "Edit", "Glob", "Grep"]
    system_prompt: |
      You are a coding agent. Do not access files in sibling runs/* directories. Everywhere else is permitted.
    plugins:
      - type: "local"
        path: "$SKILLS_REPO_PATH"
    ignore_patterns: []

  # Drop <sandbox>/{node_modules,.npm-prefix} so preserved artifacts stay slim
  # and Node module resolution can't leak across concurrent sandboxes
  # (mirrors coder_eval #253 / sandbox isolation in #250 — MST-9674).
  post_run:
    - command: "rm -rf node_modules .npm-prefix"
      timeout: 30

variants:
  - variant_id: default
