task_id: uipath-coded-apps-dashboard-full-e2e
description: >
  End-to-end build of a 4-widget agent health dashboard exercising KPI, area
  chart, line chart, and table. Validates the full compiler pipeline on the
  current architecture: intent.json (pure metadata, schemaVersion 2), one
  metric module per metric under src/metrics/ authoring real SDK calls
  (Agents.getAll + the errors and consumption Insights routes), generated
  widgets under src/dashboard/widgets/,
  named time constants, state.json written, and a clean `tsc --noEmit` over the
  generated project (the gold-standard correctness gate).
tags: [uipath-coded-apps, e2e, dashboard, mode:build, lifecycle:generate]

run_limits:
  turn_timeout: 1200

sandbox:
  driver: tempdir
  node: {}

# No per-task cleanup needed: the experiment-level post_run prunes node_modules
# (the heavy artifact) after every task, and the tempdir sandbox is discarded.
# This build-only e2e creates no remote/tenant artifacts to tear down.

# Reclaim the build's node_modules before artifact preservation. The build
# installs a full ~200MB node_modules; the experiment-default prune (30s) can
# time out on it, bloating the preserved artifact. This task-level prune runs
# FIRST (post_run is cleanup-last: task commands, then experiment defaults) with
# a generous timeout so the heavy tree is gone before the sandbox is preserved.
post_run:
  - command: 'find . -maxdepth 5 -type d \( -name node_modules -o -name .npm-prefix \) -prune -exec rm -rf {} +'
    timeout: 180

initial_prompt: |
  Build me a UiPath agent health dashboard: active agents, agent consumption
  trend over the last 24 hours, agent error trend over the week, and top
  agents by usage with health scores.

  This is a non-interactive automated test — there is NO user to approve the plan.
  Treat the plan as pre-approved and complete the whole build in this same turn. Do NOT end your turn at the plan, do
  NOT wait for confirmation, and do NOT ask any question.

success_criteria:
  - type: skill_triggered
    description: "Agent invoked the uipath-coded-apps skill"
    skill_name: "uipath-coded-apps"
    expected_skill: "uipath-coded-apps"
    weight: 1.0
    pass_threshold: 1.0

  # ── Routing: SDK calls authored in the metric modules (project auto-located) ──
  # "Consumption" is the family substring shared by every legitimate consumption
  # route (getConsumptionTimeline / getTopConsumption / getUnitConsumption /
  # getUnitConsumptionSummary) — CI 28592101807 showed pinning one method fails
  # correct builds that pick a sibling catalog route. "getErrors" likewise covers
  # getErrors + getErrorsTimeline.
  - type: run_command
    description: "Metric modules author real SDK calls: Agents.getAll, an errors query, and a consumption route"
    command: >
      python3 $SKILLS_REPO_PATH/tests/tasks/uipath-coded-apps/dashboard/_shared/check_dashboard.py
      --min-metrics 4 --min-widgets 4
      --require-substr "getAll" --require-substr "Consumption" --require-substr "getErrors"
    timeout: 30
    expected_exit_code: 0
    weight: 2.5
    pass_threshold: 1.0

  # ── Gold gate: full structural + routing + clean compile over the generated project ──
  # (tsc runs inside build-dashboard.mjs, not as a direct agent Bash call, so the
  #  compile is verified here via --tsc rather than a command_executed on tsc.)
  - type: run_command
    description: "Compiler-model gold gate: pure-metadata intent, state.json, named time constants, no legacy tokens, tsc --noEmit passes"
    command: >
      python3 $SKILLS_REPO_PATH/tests/tasks/uipath-coded-apps/dashboard/_shared/check_dashboard.py
      --min-metrics 4 --min-widgets 4 --require-starttime --require-state
      --forbid-substr fnBody --forbid-substr useInsights --forbid-substr "as unknown as"
      --tsc
    timeout: 240
    expected_exit_code: 0
    weight: 5.0
    pass_threshold: 1.0
