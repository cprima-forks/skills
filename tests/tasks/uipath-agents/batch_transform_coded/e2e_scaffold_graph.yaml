task_id: skill-agents-batch-transform-coded-e2e-scaffold-graph
description: >
  E2E: scaffold a Python coded agent that runs BatchTransform on a CSV
  attachment via the durable-interrupt pattern. Verifies the agent
  scaffolds with `uip codedagent init` and emits a graph module that
  imports CreateBatchTransform / CreateEphemeralIndex from
  uipath.platform.common, BatchTransformOutputColumn /
  EphemeralIndexUsage from uipath.platform.context_grounding, and
  durable_interrupt — and does NOT instantiate UiPath() at module top
  level.
tags: [uipath-agents, e2e, coded, lifecycle:generate, context-grounding]
max_iterations: 1

agent:
  type: claude-code
  permission_mode: acceptEdits
  allowed_tools: ["Skill", "Bash", "Read", "Write", "Edit", "Glob", "Grep"]
  turn_timeout: 1200

sandbox:
  driver: tempdir
  python: {}

initial_prompt: |
  Scaffold a Python coded UiPath agent named `batch-transform-agent`
  that takes a CSV attachment of vendors and adds two LLM-filled
  columns: a 4-digit MCC code and a confidence label (HIGH / MEDIUM /
  LOW). Implement the canonical durable-interrupt pipeline:

    1. fetch / accept the source CSV
    2. upload it as an attachment
    3. yield CreateEphemeralIndex(usage=EphemeralIndexUsage.BATCH_RAG)
       from a @durable_interrupt node
    4. yield CreateBatchTransform(is_ephemeral_index=True, ...) from
       another @durable_interrupt node, passing two
       BatchTransformOutputColumn entries
    5. finalize and return the local destination_path

  Take the agent through scaffold → init. Do NOT run, publish, upload,
  or deploy. Do NOT pause between planning and implementation. Complete
  end-to-end in a single pass.

success_criteria:
  - type: command_executed
    description: "Agent ran uip codedagent init"
    tool_name: "Bash"
    command_pattern: 'uip\s+codedagent\s+init'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent used --output json on uip commands"
    tool_name: "Bash"
    command_pattern: 'uip\s+.*--output\s+json'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  - type: run_command
    description: "Graph imports CreateBatchTransform / CreateEphemeralIndex / BatchTransformOutputColumn / durable_interrupt; passes is_ephemeral_index=True; no module-level UiPath()"
    command: "python3 $TASK_DIR/check_batch_transform_graph.py"
    timeout: 30
    expected_exit_code: 0
    weight: 6.0
    pass_threshold: 1.0
