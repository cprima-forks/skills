task_id: skill-agent-coded-eval-custom-evaluator
description: >
  Custom evaluator lifecycle. Verifies the skill guides the agent to scaffold
  a custom evaluator with `uip codedagent add evaluator`, implement it, and
  register it with `uip codedagent register evaluator` to generate the JSON
  spec. The evaluator must be wired into an eval set and run successfully.
tags: [uipath-agents, smoke, coded, lifecycle:validate, feature:eval]

run_limits:
  expected_turns: 49
  turn_timeout: 1200
  max_turns: 60

initial_prompt: |
  I want a small UiPath coded agent called `greeter` — give it a name
  and it returns "Hello, <name>!". Pure deterministic Python, no LLM.

  Once it's running locally, I want a custom evaluator for it that flags
  whether the agent responds quickly enough — say, under about half a
  second. Hook that evaluator up to an eval set with a couple of test
  cases and run it locally — no cloud reporting — and write the results
  out so I can review them.

  It's all local — no sign-in, nothing to publish or deploy. Work
  straight through in one pass.

success_criteria:
  - type: command_executed
    description: "Agent scaffolded the custom evaluator with uip codedagent add evaluator"
    tool_name: "Bash"
    command_pattern: 'uip\s+codedagent\s+add\s+evaluator'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent registered the evaluator with uip codedagent register evaluator"
    tool_name: "Bash"
    command_pattern: 'uip\s+codedagent\s+register\s+evaluator'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent ran the eval suite with --no-report"
    tool_name: "Bash"
    command_pattern: 'uip\s+codedagent\s+eval\s+.*--no-report'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: run_command
    description: "Custom evaluator file, JSON spec, eval set, and results shape"
    command: "python3 $TASK_DIR/check_eval_custom_evaluator.py"
    timeout: 30
    expected_exit_code: 0
    weight: 5.0
    pass_threshold: 1.0
