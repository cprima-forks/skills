task_id: skill-agent-coded-simple-echo
description: >
  Simple Function coded agent zero-to-running. The skill must guide the
  agent through scaffold (`uip codedagent new`), entrypoint registration
  in `uipath.json`, `uip codedagent init` (emitting `entry-points.json`),
  and a local `uip codedagent run` (deterministic, no LLM, no cloud
  auth). The check re-runs the agent itself to confirm the echo output
  is correct.
tags: [uipath-agents, smoke, coded, lifecycle:generate, lifecycle:execute, feature:framework-simple]
  # Default smoke max_turns is 20, but the full scaffold -> init -> run
  # loop (uv venv, uv sync, uip codedagent setup, uip codedagent new,
  # rewrite main.py, init, run, write marker) lands at ~25 turns even
  # without an LLM call. Bumping headroom to 40.

run_limits:
  expected_turns: 25
  max_turns: 40
  turn_timeout: 1200

initial_prompt: |
  I need a tiny UiPath coded agent — call it `echo-agent` — that just
  echoes text back to me.

  Give it a `message` to echo and a `repeat` count that defaults to
  once when I leave it out. It should return the message repeated that
  many times as `echoed`, plus the character `length` of that result.
  Keep it pure, deterministic Python — no LLM, no network, no cloud
  calls.

  Build it as a Coded Function agent and make sure it actually runs
  cleanly on my machine before you call it done. It's all local — no
  UiPath Cloud sign-in, and nothing to publish or deploy. Just take it
  end-to-end in one pass without checking in with me.

success_criteria:
  - type: command_executed
    description: "Agent scaffolded the project with uip codedagent new"
    tool_name: "Bash"
    command_pattern: 'uip\s+codedagent\s+new'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent ran uip codedagent init to generate entry-points.json"
    tool_name: "Bash"
    command_pattern: 'uip\s+codedagent\s+init'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent executed the agent locally with uip codedagent run"
    tool_name: "Bash"
    command_pattern: 'uip\s+codedagent\s+run\s+main'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: run_command
    description: "Project shape, lazy-init, schema sync, pyproject hygiene, and a live echo run"
    command: "python3 $TASK_DIR/check_simple_echo.py"
    timeout: 150
    expected_exit_code: 0
    weight: 5.0
    pass_threshold: 1.0
