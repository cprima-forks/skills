task_id: skill-agent-coded-hitl-wait-task
description: >
  Coded-agent HITL via `interrupt(WaitTask(...))` — the "wait for an
  already-created Action Center task" pattern. Verifies the agent
  imports `interrupt` from `langgraph.types` and `WaitTask` from
  `uipath.platform.common`, wires a graph node that pauses on a task
  the caller passes in, and keeps the resume payload available for a
  downstream node. Distinct from `CreateTask` / `CreateEscalation`
  (those make a new task).
tags: [uipath-agents, e2e, mode:build, coded, lifecycle:generate, feature:framework-langgraph, feature:hitl-coded]
max_iterations: 1

initial_prompt: |
  Build a UiPath coded agent (LangGraph) named `purchase-gate` that
  closes the loop on a purchase request that's already been opened for
  human review somewhere else. The open Action Center task is handed to
  the agent as input — it should wait until the reviewer finishes that
  existing task, then read their decision and produce a short, structured
  outcome: whether it was approved and whatever note the reviewer left.

  It also gets a one-line summary of the purchase for context. Put the
  project in a `purchase-gate/` directory at the working-directory root.

  I just need it built — no need to run it, sign in, or deploy. Take it
  through in one pass.

success_criteria:
  - type: command_executed
    description: "Agent scaffolded the project"
    tool_name: "Bash"
    command_pattern: 'uip\s+codedagent\s+new'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent regenerated schemas from the code"
    tool_name: "Bash"
    command_pattern: 'uip\s+codedagent\s+init'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: run_command
    description: "LangGraph config, interrupt(WaitTask) shape, correct imports, no CreateTask/CreateEscalation, graph exported"
    command: "python3 $TASK_DIR/check_hitl_wait_task.py"
    timeout: 30
    expected_exit_code: 0
    weight: 7.0
    pass_threshold: 1.0

run_limits:
  expected_turns: 36
  turn_timeout: 1200
