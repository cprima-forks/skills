task_id: skill-agent-coded-hitl-create-task-with-app
description: >
  Coded-agent HITL via `interrupt(CreateTask(...))` — the regular
  Action Center task pattern (NOT escalation). Distinct from
  `hitl_create_task` (which targets `CreateEscalation`) and from
  `hitl_wait_task` (which monitors an existing task). Verifies the
  agent imports `CreateTask` from `uipath.platform.common`, wires
  `interrupt(CreateTask(app_name=..., app_folder_path=..., title=...,
  data={...}, assignee=...))` into a graph node, and emits the
  matching `app` resource binding. 
tags: [uipath-agents, e2e, mode:build, coded, lifecycle:generate, feature:framework-langgraph, feature:hitl-coded]
max_iterations: 1

initial_prompt: |
  Build a UiPath coded agent (LangGraph) named `refund-gate`. When it's
  asked to issue a
  refund over $500, it must pause and file a structured request for a
  reviewer on the Compliance team in their `RefundReview` Action Center
  app (folder `Compliance`) — the reviewer needs the customer, the
  amount, and the stated reason. Once the reviewer replies, the agent
  continues and produces a final outcome: whether to issue the refund
  and the reviewer's note. Refunds of $500 or less go through without
  review.

  Make sure the RefundReview app is hooked up for the agent — without it
  the request can't be filed. Put the project in a `refund-gate/`
  directory at the working-directory root.

  I just need it built — no need to run it, sign in, or deploy. Work
  through it in one pass.

success_criteria:
  - type: command_executed
    description: "Agent scaffolded the project"
    tool_name: "Bash"
    command_pattern: 'uip\s+codedagent\s+new'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent regenerated schemas from the code"
    tool_name: "Bash"
    command_pattern: 'uip\s+codedagent\s+init'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: run_command
    description: "LangGraph config, interrupt(CreateTask) shape (not CreateEscalation), correct app targeting, RefundReview/Compliance app binding"
    command: "python3 $TASK_DIR/check_hitl_create_task_with_app.py"
    timeout: 30
    expected_exit_code: 0
    weight: 7.0
    pass_threshold: 1.0

run_limits:
  expected_turns: 36
  turn_timeout: 1200
