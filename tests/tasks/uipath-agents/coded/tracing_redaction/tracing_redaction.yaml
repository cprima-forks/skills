task_id: skill-agent-coded-tracing-redaction
description: >
  Coded-agent tracing with redaction. Verifies the agent applies
  `@traced(name=..., input_processor=..., output_processor=...)` to
  a function that handles sensitive data so both the input and the
  output are redacted before they reach the trace store.
tags: [uipath-agents, e2e, coded, lifecycle:generate, feature:trace]

run_limits:
  expected_turns: 31
  task_timeout: 1800
  turn_timeout: 1200
  max_turns: 40

initial_prompt: |
  Build a UiPath coded agent named `credential-validator` that takes a
  username and password and hands back an auth token. Treat any
  non-empty password as valid — this is a stub, so just mint a token
  from the username; there's no real auth backend.

  The important part: add tracing to the entrypoint, but redact the
  sensitive values so the trace store never captures the raw password
  or the raw token. Other fields are fine to record, and each span
  should still be easy to find in trace search.

  I just want it built and traced — no need to actually run it, deploy
  it, or sign in anywhere. Go straight through in one pass.

success_criteria:
  - type: command_executed
    description: "Agent ran uip codedagent init"
    tool_name: "Bash"
    command_pattern: 'uip\s+codedagent\s+init'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: run_command
    description: "@traced wired with name + input_processor + output_processor"
    command: "python3 $TASK_DIR/check_tracing_redaction.py"
    timeout: 30
    expected_exit_code: 0
    weight: 6.0
    pass_threshold: 1.0
