task_id: skill-agent-coded-hitl-create-task
description: >
  Coded-agent HITL via `interrupt(CreateEscalation(...))`. Verifies
  the agent imports `interrupt` from `langgraph.types` and
  `CreateEscalation` from `uipath.platform.common`, compiles the
  graph with a `MemorySaver` checkpointer, and emits the `app`
  binding for the Action Center app the escalation targets.
tags: [uipath-agents, e2e, coded, lifecycle:generate, feature:hitl-coded]

run_limits:
  expected_turns: 29
  turn_timeout: 1200

initial_prompt: |
  Build a Python UiPath coded agent (LangGraph) named `expense-approver`
  that handles expense-reimbursement requests. Requests of $1000 or less
  are auto-approved; anything above that has to be escalated to a manager
  for sign-off before it can be approved.

  When a request goes over the limit, escalate it to a reviewer through
  an Action Center app called `ExpenseReview` in the `Finance` folder,
  passing along the full request. The agent should pause while the
  escalation is outstanding and pick back up once the reviewer's
  decision comes in, then report whether it was approved and what the
  reviewer decided.

  I just need it built with the ExpenseReview app hooked up so it can
  actually escalate — no need to run it, sign in, or deploy. Take it
  through in one pass.

success_criteria:
  - type: command_executed
    description: "Agent scaffolded the project with uip codedagent new"
    tool_name: "Bash"
    command_pattern: 'uip\s+codedagent\s+new'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent ran uip codedagent init"
    tool_name: "Bash"
    command_pattern: 'uip\s+codedagent\s+init'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: run_command
    description: "interrupt(CreateEscalation) shape, MemorySaver checkpointer, app binding"
    command: "python3 $TASK_DIR/check_hitl_create_task.py"
    timeout: 30
    expected_exit_code: 0
    weight: 6.0
    pass_threshold: 1.0
