task_id: skill-agent-coded-file-attachment-input
description: >
  Coded agent that accepts a file attachment as input. Verifies the agent
  uses `from uipath.platform.attachments import Attachment` on the `Input`
  model and runs `uip codedagent init` so `entry-points.json` emits the
  `x-uipath-resource-kind: JobAttachment` schema that Studio Web and
  Orchestrator use to render a file picker at runtime.
tags: [uipath-agents, smoke, coded, lifecycle:generate, feature:framework-simple]

run_limits:
  expected_turns: 33

initial_prompt: |
  I want a UiPath coded agent named `attachment-agent` that takes a file
  attachment as its input and returns the file's name and its contents.

  First drop a `test.txt` file in the current directory containing
  `This is the file content`, so there's something to feed it. Then
  build the agent and run it locally against that file to confirm it
  reads the name and content back.

  All local — nothing to publish or deploy. Go straight through in one
  pass.

success_criteria:
  - type: command_executed
    description: "Agent scaffolded the project with uip codedagent new"
    tool_name: "Bash"
    command_pattern: 'uip\s+codedagent\s+new'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent ran uip codedagent init to generate entry-points.json"
    tool_name: "Bash"
    command_pattern: 'uip\s+codedagent\s+init'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent ran the agent locally with uip codedagent run"
    tool_name: "Bash"
    command_pattern: 'uip\s+codedagent\s+run'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: run_command
    description: "Attachment import, Input model, lazy-init, JobAttachment schema"
    command: "python3 $TASK_DIR/check_file_attachment_input.py"
    timeout: 30
    expected_exit_code: 0
    weight: 5.0
    pass_threshold: 1.0
