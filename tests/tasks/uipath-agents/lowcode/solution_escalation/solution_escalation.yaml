task_id: skill-agent-solution-escalation-tool
description: >
  Add escalation app tools to an existing agent inside an existing
  solution (brownfield). The fixture ships a `ReviewSol` solution that
  already contains a registered low-code `ModerationAgent` project. The
  agent must add a `HumanReview` escalation resource to the pre-existing
  `ModerationAgent` — reusing it, NOT re-creating it and NOT
  re-initializing the solution. Verifies the `$resourceType: "escalation"`
  resource.json format, the ActionCenter channel wiring, and that
  `uip agent validate` accepts the escalation after refresh regenerates
  derived files.
tags: [uipath-agents, e2e, mode:build, low-code]

run_limits:
  expected_turns: 18
  turn_timeout: 1200

pre_run:
  - command: "cp -r $SKILLS_REPO_PATH/tests/tasks/uipath-agents/lowcode/solution_escalation/_fixtures/ReviewSol ."
    timeout: 10

initial_prompt: |
  Add a "HumanReview" escalation to the existing "ModerationAgent" agent inside
  the existing "ReviewSol" solution (in the current directory). When the agent
  is uncertain, it should be able to escalate to a human reviewer via UiPath
  Action Center.

  Do NOT publish, upload, or deploy. Do NOT ask for approval,
  confirmation, or feedback. Do NOT pause between planning and
  implementation. Complete the entire task end-to-end in a single pass.

success_criteria:
  # Brownfield: the solution already exists in the fixture.
  - type: command_not_executed
    description: "Agent did NOT re-initialize the pre-existing solution"
    tool_name: "Bash"
    command_pattern: 'uip\s+solution\s+init'
    exclude_pattern: '--help'
    weight: 1.0
    pass_threshold: 1.0

  # Brownfield: ModerationAgent ships in the fixture. The agent must
  # reuse it, not scaffold a fresh copy over it.
  - type: command_not_executed
    description: "Agent did NOT re-create the existing ModerationAgent project"
    tool_name: "Bash"
    command_pattern: 'uip\s+agent\s+init'
    weight: 1.5
    pass_threshold: 1.0

  # Outcome-based check: the fixture .uipx already has ModerationAgent
  # registered. No new project is added, so Projects[] stays at 1.
  - type: json_check
    description: "ModerationAgent is registered in the parent solution .uipx"
    path: "ReviewSol/ReviewSol.uipx"
    assertions:
      - expression: "length(Projects)"
        operator: "gte"
        expected: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent refreshed the project to regenerate derived files"
    tool_name: "Bash"
    command_pattern: 'uip\s+agent\s+refresh'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent validated the project"
    tool_name: "Bash"
    command_pattern: 'uip\s+agent\s+validate'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Advisory: agent used --output json on uip commands (informational, non-gating)"
    tool_name: "Bash"
    command_pattern: 'uip\s+.*--output\s+json'
    min_count: 1
    weight: 1.0
    pass_threshold: 0.0

  - type: file_exists
    description: "HumanReview escalation resource.json was created"
    path: "ReviewSol/ModerationAgent/resources/HumanReview/resource.json"
    weight: 2.5
    pass_threshold: 1.0

  - type: run_command
    description: "Escalation resource shape and ActionCenter channel wiring"
    command: "python3 $TASK_DIR/check_solution_escalation.py"
    timeout: 30
    expected_exit_code: 0
    weight: 5.0
    pass_threshold: 1.0
