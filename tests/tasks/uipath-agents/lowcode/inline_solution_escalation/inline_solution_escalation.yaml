task_id: skill-agent-inline-solution-escalation-tool
description: >
  Add escalation app tools (solution resource) for flow inline agents
  inside an existing solution (brownfield). The fixture ships a
  `ReviewFlowSol` solution that already contains a registered low-code
  `ModerationAgent` project. The agent must add a NEW `ReviewFlow` Flow
  project whose inline low-code agent escalates uncertain cases to a
  human reviewer via UiPath ActionCenter — reusing the existing solution
  structure, NOT re-creating `ModerationAgent` and NOT re-initializing
  the solution. Verifies the escalation resource.json under the inline
  agent's UUID subdirectory + a `uipath.agent.resource.escalation` flow
  node wired to the autonomous agent node's `escalation` handle.
tags: [uipath-agents, e2e, mode:build, low-code, inline-flow]

run_limits:
  expected_turns: 60
  turn_timeout: 1200

pre_run:
  - command: "cp -r $SKILLS_REPO_PATH/tests/tasks/uipath-agents/lowcode/inline_solution_escalation/_fixtures/ReviewFlowSol ."
    timeout: 10

# An agent left to itself often models "escalate to a human" as a human-in-the-loop
# flow node — fine in general, but this task specifically exercises the agent
# Escalation capability, so the prompt asks for it explicitly.
initial_prompt: |
  Create a new UiPath Flow project named "ReviewFlow" inside the existing
  "ReviewFlowSol" solution (in the current directory). The flow must use
  an inline low-code agent to moderate user content and escalate uncertain
  cases to a human reviewer via a UiPath Action Center app in this same
  solution. Set this up using the agent's Escalation capability, wired into the flow — not a standalone
  human-in-the-loop node.

  Do NOT publish, upload, or deploy. Do NOT ask for approval,
  confirmation, or feedback. Do NOT pause between planning and
  implementation. Complete the entire task end-to-end in a single pass.

success_criteria:
  # Brownfield: the solution already exists in the fixture.
  - type: command_not_executed
    description: "Agent did NOT re-initialize the pre-existing solution"
    tool_name: "Bash"
    command_pattern: 'uip\s+solution\s+init'
    exclude_pattern: '--help'
    weight: 1.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent scaffolded the inline agent with --inline-in-flow"
    tool_name: "Bash"
    command_pattern: 'uip\s+agent\s+init\s+.*--inline-in-flow'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  # Brownfield: ModerationAgent ships in the fixture. The agent must not
  # scaffold a standalone agent over it.
  - type: command_not_executed
    description: "Agent did NOT re-create the existing ModerationAgent project"
    tool_name: "Bash"
    command_pattern: 'uip\s+agent\s+init\s+["'']?ModerationAgent'
    weight: 1.5
    pass_threshold: 1.0

  # Outcome-based check: the fixture .uipx starts with ModerationAgent
  # registered; auto-registration of the new Flow project must bring
  # Projects[] to 2.
  - type: json_check
    description: "ReviewFlow is registered alongside ModerationAgent in the parent solution .uipx"
    path: "ReviewFlowSol/ReviewFlowSol.uipx"
    assertions:
      - expression: "length(Projects)"
        operator: "gte"
        expected: 2
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent refreshed the inline agent with --inline-in-flow"
    tool_name: "Bash"
    command_pattern: 'uip\s+agent\s+refresh\s+.*--inline-in-flow'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent validated the inline agent with --inline-in-flow"
    tool_name: "Bash"
    command_pattern: 'uip\s+agent\s+validate\s+.*--inline-in-flow'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Advisory: agent used --output json on uip commands (informational, non-gating)"
    tool_name: "Bash"
    command_pattern: 'uip\s+.*--output\s+json'
    min_count: 1
    weight: 1.0
    pass_threshold: 0.0

  - type: file_exists
    description: "Flow file was created"
    path: "ReviewFlowSol/ReviewFlow/ReviewFlow.flow"
    weight: 1.5
    pass_threshold: 1.0

  - type: run_command
    description: "Inline solution escalation: resource.json shape + escalation flow node + escalation-handle edge"
    command: "python3 $TASK_DIR/check_inline_solution_escalation.py"
    timeout: 30
    expected_exit_code: 0
    weight: 5.0
    pass_threshold: 1.0
