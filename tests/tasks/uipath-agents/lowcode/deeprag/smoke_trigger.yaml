task_id: skill-agents-deeprag-lowcode-smoke-trigger
description: >
  Smoke test: agent should trigger the uipath-agents skill when the
  user asks to research / synthesize across PDF or TXT documents from
  a Studio Web Agent Builder / `agent.json` (lowCode) project.
  Verifies the skill fires for the low-code + PDF/TXT signal pair.
tags: [uipath-agents, smoke, low-code, lifecycle:discover, context-grounding]

sandbox:
  driver: tempdir
  python: {}

initial_prompt: |
  I'm building a low-code agent in Studio Web Agent Builder
  (`agent.json` with `"type": "lowCode"`). It receives multiple PDF
  attachments and must synthesize a single answer with citations. Tell
  me which skill applies and which built-in tool I need to enable. Do
  NOT scaffold any files.

success_criteria:
  - type: skill_triggered
    description: "Agent invoked the uipath-agents skill"
    expected_skill: "uipath-agents"
    expected: "yes"
    weight: 3.0
    pass_threshold: 1.0
