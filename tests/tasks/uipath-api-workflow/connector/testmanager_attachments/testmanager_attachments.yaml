# skip:true, tenant-gated. CONFIRMED available in API Workflow (2026-06-15).
# Covers all 4 attachment activities. skip:true: agent-reliability-gated (multi-activity build + run flakes
# on turns/rate-limits). The codereval TM connection now exists.
task_id: skill-api-workflow-testmanager-attachments
description: >
  Coverage (API Workflow connector): agent authors an API Workflow using every
  UiPath Test Manager connector attachment activity — Upload Attachment, Get
  Attachments, Download Attachment, Delete Attachment. Drives registry resolve →
  connection ping → stub per activity → validate for `uipath-uipath-testmanager`.
tags: [uipath-api-workflow, e2e, mode:build, lifecycle:generate, connector]
skip: true

run_limits:
  task_timeout: 2400
  max_turns: 60
  turn_timeout: 1200

initial_prompt: |
  Build a UiPath API Workflow that uses the UiPath Test Manager Integration Service connector to exercise the full operation set — perform each of these:

  - Upload an attachment
  - Get attachments
  - Download an attachment
  - Delete an attachment

  The task is not complete until validation passed for the workflow.

  Do NOT ask for approval, confirmation, or feedback.
  Do NOT pause between planning and implementation.

success_criteria:
  - type: command_executed
    description: "Agent loaded the uipath-api-workflow skill"
    tool_name: "Skill"
    command_pattern: "uipath-api-workflow"
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Discovered connector activities via the registry"
    tool_name: "Bash"
    command_pattern: '(uip|\$UIP)\s+api-workflow\s+registry\s+resolve\s'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Listed or pinged the testmanager connection"
    tool_name: "Bash"
    command_pattern: '(uip|\$UIP)\s+is\s+connections\s+(list[\s\S]{0,200}?uipath-uipath-testmanager|ping)'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Stubbed each attachment activity (4) with a real connection id"
    tool_name: "Bash"
    command_pattern: '(uip|\$UIP)\s+api-workflow\s+registry\s+stub[\s\S]+?--connection-id'
    min_count: 4
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Validated the workflow"
    tool_name: "Bash"
    command_pattern: '(uip|\$UIP)\s+api-workflow\s+validate'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: file_exists
    description: "Workflow.json was created"
    path: "Workflow.json"
    weight: 1.0
    pass_threshold: 1.0

  - type: file_check
    description: "Workflow uses the testmanager IntSvc connector"
    path: "Workflow.json"
    includes: ["uipath-uipath-testmanager", "UiPath.IntSvc"]
    excludes: ["<REPLACE_WITH_"]
    weight: 2.0
    pass_threshold: 1.0
