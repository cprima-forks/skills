task_id: skill-mcp-servers-slack-create
description: |
  Wrap Slack `send_message_to_channel_v2` Create as an MCP tool on `test-mcp-skill`. LLM picks channel and provides message text; `send_as` baked with designTimeLookups.
tags: [uipath-mcp-servers, smoke, 'mode:build']
agent:
  type: claude-code
  allowed_tools: [Bash, Read, Write]
sandbox:
  driver: tempdir
  python: {}
  template_sources:
  - {type: template_dir, path: ../_shared/mock_template}
  - {type: template_dir, path: fixtures}
  mock_path_dirs: [mocks]
initial_prompt: |
  Load the uipath-mcp-servers skill and follow its documented workflow for this tool end to end. For an IS-activity tool, read references/is-activity-workflow.md and use the exact `uip agenthub mcp-tools create-is-activity` flags it specifies (`--mcp`, `--target-identifier`, `--description`, `--metadata`, `--input-schema`, `--output-schema`); for a resource tool, read the resource guidance and run `mcp-tools candidates`/`template` as it directs. Use the exact CLI commands and flags the skill documents — do not invent flag names.

  Use the mocked `uip` CLI.

  TASK: Add a Slack 'Send Message to Channel' tool to `test-mcp-skill`.
  Use the Slack connection in personal workspace. Bake `send_as=bot` (the
  agent posts as a bot, every call). LLM should pick the channel and
  provide the message text at runtime. Use --dry-run on the final create call.

  Refs:
    - connector key: uipath-salesforce-slack
    - Slack connection id: conn-mock-slack-01 (in folder-mock-workspace)
    - MCP server: test-mcp-skill (folder-mock-shared)

  Save: metadata.json, input-schema.json, output-schema.json, create-command.sh,
  trajectory.md, summary.txt to cwd.
success_criteria:
- type: file_contains
  path: metadata.json
  includes: [uipath-salesforce-slack, send_message_to_channel_v2]
  description: '`metadata.json` contains the expected content'
- type: file_contains
  description: send_as baked + designTimeLookups populated
  path: metadata.json
  includes: [send_as]
- {type: file_exists, description: input-schema.json was produced (schema content is agent-dependent;
    smoke verifies the artifact), path: input-schema.json, weight: 1.0, pass_threshold: 1.0}
- {type: file_exists, description: '`create-command.sh` was produced', path: create-command.sh, weight: 1.0,
  pass_threshold: 1.0}
run_limits: {max_turns: 60}
