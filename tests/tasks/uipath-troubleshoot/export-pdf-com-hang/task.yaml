task_id: skill-troubleshoot-export-pdf-com-hang
description: >
  UiPath troubleshooting agent must diagnose an Export to PDF COM interop
  failure: an orphaned WINWORD.EXE (a Word instance already running on the
  host) blocks the export's COM call, which faults with COMException
  (RPC_E_CALL_REJECTED). Success = agent matches the export-pdf-com-hang
  playbook AND recommends clearing the stale Word session (Kill Process
  WINWORD before the scope + dispose; ensure input free), with the Invoke
  Code C# ExportAsFixedFormat fallback as an option — without fabricating
  host actions or blaming the output path/document.
tags: [uipath-troubleshoot, e2e, faulted-jobs, orchestrator, word-activities, export-pdf, rpa]

agent:
  type: claude-code
  allowed_tools: ["Bash", "Read", "Write", "Edit", "Glob", "Grep", "Skill", "Agent", "AskUserQuestion", "TodoWrite"]

run_limits:
  task_timeout: 5400
  max_turns: 60
  turn_timeout: 3600

sandbox:
  template_sources:
  - type: template_dir
    path: ../_shared/mock_template
  - type: template_dir
    path: process
  - type: template_dir
    path: fixtures
  mock_path_dirs:
  - mocks

reference:
  file: RESOLUTION.md

initial_prompt: |
  My BatchPdfConvert process faults intermittently in Orchestrator (folder
  "Batch PDF", machine MOCK-HOST). It's a scheduled job that converts Word
  docs to PDF, and it throws a COM error when it exports. Re-running
  sometimes works.

  I'm not on the robot host right now, only Orchestrator. Diagnose what you
  can. If the fix needs the workflow changed or something checked/done on
  the host, give me the exact steps and stop.

  The project source for the process is in the current working directory.

success_criteria:
  - type: skill_triggered
    description: "Agent invoked the uipath-troubleshoot skill"
    skill_name: "uipath-troubleshoot"
    expected_skill: "uipath-troubleshoot"
    weight: 1.0

  - type: llm_judge
    description: "Agent matched export-pdf-com-hang AND recommended clearing the stale Word session"
    weight: 3.0
    pass_threshold: 0.7
    include_reference: true
    include_agent_output: true
    include_tool_calls: true
    prompt: |
      You are grading a UiPath troubleshooting agent against a known-correct
      reference outcome (the attached RESOLUTION.md is authoritative).

      The user's request:
        "BatchPdfConvert faults intermittently in Orchestrator (folder 'Batch
         PDF', machine MOCK-HOST) converting Word docs to PDF; it throws a
         COM error on export. Re-running sometimes works."

      DIMENSION A -- Correct playbook
        Matches references/activity-packages/word-activities/playbooks/export-pdf-com-hang.md
        because a `COMException` (`RPC_E_CALL_REJECTED` / `0x80010001`) from
        `Export to PDF`, intermittent, with a "Word already running on the
        host" warning, is the orphaned/busy-WINWORD COM-interop signature.

      DIMENSION B -- Same conclusion as RESOLUTION.md
        Root cause: an orphaned `WINWORD.EXE` (the job log warns a Word
        instance was already running when the scope started) blocks the
        export's COM call → `COMException`. Intermittency ("re-running
        sometimes works") confirms a transient busy/locked Word state, not a
        code defect.
        Fix: clear the stale Word session — add a `Kill Process` for WINWORD
        before the Word scope (and ensure the scope disposes so it doesn't
        orphan WINWORD), confirm the input doc isn't locked elsewhere;
        persistent COM errors → an Invoke Code C# `ExportAsFixedFormat`
        fallback (with `finally { wordApp.Quit(); }`).

      DIMENSION C -- Off-host: no fabricated actions
        The user is off-host. The agent may recommend the workflow change
        (Kill Process / Invoke Code) and hand over host checks (orphaned
        WINWORD.EXE, input lock); it must NOT claim to have killed processes
        or run host commands itself, and must NOT blame the output path or
        the document.

      SCORING RUBRIC:
        1.0  Matched export-pdf-com-hang AND identified an orphaned/busy
             WINWORD blocking the export's COM call as the cause AND
             recommended clearing it (Kill Process WINWORD before the scope /
             dispose / ensure input free), optionally noting the Invoke Code
             ExportAsFixedFormat fallback — without fabricating host actions
             or blaming the path/document.
        0.8  Correct playbook and cause but the fix is vague (e.g., "clear
             the COM state" without naming Kill Process WINWORD).
        0.5  Recognized a COM/transient problem but did not tie it to a
             busy/orphaned WINWORD (e.g., blamed Word-not-installed startup
             COM), or matched a sibling export-pdf playbook.
        0.2  Surfaced the HRESULT without diagnosis.
        0.0  Wrong cause (missing output dir, malformed path, document
             corrupt, Word not installed as primary) or fabricated a host
             action.

      Return JSON: {"score": <float>, "rationale": "<one sentence>"}

simulation:
  enabled: true
  persona: |
    You are the user who reported the intermittent PDF-conversion failure. It
    throws a COM error on export and re-running sometimes works. You are
    off-host, Orchestrator only. You want a diagnosis plus steps.
  goal: |
    Let the agent complete its flow; approve scope expansions / clarifications.
  constraints:
    - "If the agent asks whether to expand investigation scope (orchestrator, word-activities, activity-packages), always answer Yes - pick the recommended / first / affirmative option."
    - "If the agent asks how to proceed when data is missing, tell it to proceed with best-effort findings and hand you the steps."
    - "If asked whether an orphaned WINWORD.EXE is running on the host or the input is locked, say you are not sure and cannot check right now."
    - "Never invent or provide new factual data beyond your initial report."
    - "Keep replies short (one sentence or pick a numbered option)."
    - "Never instruct the agent to stop, abort, or skip phases."
  max_turns: 6
