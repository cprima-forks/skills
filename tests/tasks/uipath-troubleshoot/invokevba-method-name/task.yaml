task_id: skill-troubleshoot-invokevba-method-name
description: >
  UiPath troubleshooting agent must diagnose an Invoke VBA failure caused by
  EntryMethodName="ProcessInvoces" (typo, missing an "i") not matching the
  Sub declared in macro.txt (Sub ProcessInvoices). Success = agent matches
  the invoke-vba-entry-method-name playbook AND identifies the typo against
  the correctly-spelled Sub in the code file.
tags: [uipath-troubleshoot, e2e, faulted-jobs, orchestrator, excel-activities, invoke-vba, rpa]

agent:
  type: claude-code
  allowed_tools: ["Bash", "Read", "Write", "Edit", "Glob", "Grep", "Skill", "Agent", "AskUserQuestion", "TodoWrite"]

task_timeout: 5400
max_turns: 60
turn_timeout: 3600

sandbox:
  template_sources:
  - type: template_dir
    path: ../_shared/mock_template
  - type: template_dir
    path: process
  - type: template_dir
    path: fixtures
  mock_path_dirs:
  - mocks

reference:
  file: RESOLUTION.md

initial_prompt: |
  My InvoiceImporter process is faulting in Orchestrator on every run.
  The folder is "RPA Production". Can you investigate?

  The project source for the failing process is in the current working
  directory.

success_criteria:
  - type: skill_triggered
    description: "Agent invoked the uipath-troubleshoot skill"
    skill_name: "uipath-troubleshoot"
    expected_skill: "uipath-troubleshoot"
    weight: 1.0

  - type: llm_judge
    description: "Agent matched the invoke-vba-entry-method-name playbook AND identified the EntryMethodName typo"
    weight: 3.0
    pass_threshold: 0.7
    include_reference: true
    include_agent_output: true
    include_tool_calls: true
    files:
      - .local/investigations/state.json
      - .local/investigations/hypotheses.json
    prompt: |
      You are grading a UiPath troubleshooting agent against a known-correct
      reference outcome. The Reference solution attached to this prompt is
      the RESOLUTION.md for this scenario. Treat it as authoritative.

      The user's request was:
        "My InvoiceImporter process is faulting in Orchestrator on every
         run. The folder is 'RPA Production'."

      DIMENSION A -- Correct playbook
        The matching playbook is
          references/activity-packages/excel-activities/playbooks/invoke-vba-entry-method-name.md
        because the runtime error
          "Cannot run the macro 'ProcessInvoces'. The macro may not be
           available in this workbook"
        is the verbatim signature of an entry-method-name mismatch.

      DIMENSION B -- Same conclusion as RESOLUTION.md
        The reference root cause is:
          - `Main.xaml`'s Invoke VBA activity sets
            `EntryMethodName="ProcessInvoces"` (typo - missing an "i").
          - `macro.txt` declares `Sub ProcessInvoices()` (correctly
            spelled). Application.Run cannot resolve the typo'd name, so
            the activity faults.
        The reference fix:
          - Fix `EntryMethodName` in `Main.xaml` to `"ProcessInvoices"`
            (or alternatively rename the Sub in `macro.txt` to match the
            workflow if that is the intentional convention).

      SCORING RUBRIC:
        1.0  Agent matched invoke-vba-entry-method-name AND identified
             the typo explicitly (named "ProcessInvoces" vs
             "ProcessInvoices").
        0.8  Correct playbook but conclusion says "macro name does not
             match" without naming the typo specifically.
        0.5  Correct playbook but recommended a sibling cause (e.g.,
             "Sub is Private" or "method is nested") instead of the
             actual typo.
        0.2  Surfaced the error message without diagnosing the typo.
        0.0  Wrong cause (e.g., concluded Trust Center, code-file-path
             missing wrapper, parameter mismatch, or COM interop), or
             never compared the XAML EntryMethodName to the macro.txt
             Sub declaration.

      Reward either path: agent (a) reads both `Main.xaml` and
      `macro.txt` directly to compare names, or (b) escalates to the
      user after reading one of them.

      Return JSON: {"score": <float>, "rationale": "<one sentence>"}

simulation:
  enabled: true
  persona: |
    You are the UiPath user who originally reported the failing process.
    You are waiting for the troubleshooting agent to finish its
    investigation. You only have the information you wrote in your
    initial report.
  goal: |
    Let the agent complete its troubleshooting flow without imposing
    constraints. Approve every scope expansion or clarification the
    agent requests.
  constraints:
    - "If the agent asks whether to expand investigation scope (any new product domain such as orchestrator, excel-activities, activity-packages), always answer Yes - pick the recommended / first / affirmative option."
    - "If the agent asks how to proceed when data is missing, tell it to proceed with best-effort findings using the evidence already gathered."
    - "Never invent or provide new factual data - you don't know any details beyond your initial report."
    - "Keep replies short (one sentence or pick a numbered option)."
    - "Never instruct the agent to stop, abort, or skip phases."
  max_turns: 6
