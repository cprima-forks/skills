task_id: skill-troubleshoot-web-deserialize-malformed-input
description: >
  UiPath troubleshoot agent must diagnose a Deserialize JSON failure
  (Newtonsoft.Json.JsonReaderException: "Unexpected character
  encountered while parsing value: <. Path '', line 0, position 0.")
  in the ParseResponse process. The agent must match the
  activity-packages/web-activities/playbooks/deserialize-malformed-input.md
  playbook, recognize the leading '<' as a non-JSON / HTML body fed
  into a JSON parser, inspect the workflow source to find the
  Deserialize JSON input is a hardcoded non-JSON literal (no upstream
  HttpClient / NetHttpRequest), and recommend ensuring valid JSON /
  guarding the parse on a success response. Replayed from a real
  staging faulted job.

tags: [uipath-troubleshoot, e2e, mode:diagnose, web-activities, rpa]

agent:
  type: claude-code
  allowed_tools: ["Bash", "Read", "Write", "Edit", "Glob", "Grep", "Skill", "TodoWrite"]

run_limits:
  task_timeout: 5400
  max_turns: 60
  turn_timeout: 3600

sandbox:
  driver: tempdir
  python: {}
  template_sources:
    - type: template_dir
      path: ../_shared/mock_template
    - type: template_dir
      path: process
    - type: template_dir
      path: fixtures
  mock_path_dirs: ["mocks"]

reference:
  file: RESOLUTION.md

initial_prompt: |
  My last job in folder Shared just faulted. Job key
  febd892d-787b-4008-a573-4af66cf710cf. Why did it fail and how do I
  fix it?

  The project source for the failing process is at ./WebRepro/ in the
  current working directory.

success_criteria:
  - type: skill_triggered
    description: "Agent invoked the uipath-troubleshoot skill"
    skill_name: "uipath-troubleshoot"
    expected_skill: "uipath-troubleshoot"
    weight: 1.0

  - type: llm_judge
    description: "Agent matched the deserialize-malformed-input playbook and concluded the Deserialize JSON input is a non-JSON / HTML string (literal, no upstream HTTP)"
    weight: 3.0
    pass_threshold: 0.7
    include_reference: true
    include_agent_output: true
    include_tool_calls: true
    prompt: |
      You are grading a UiPath troubleshooting agent against a known-correct
      reference outcome. The Reference solution attached to this prompt is
      the RESOLUTION.md for this scenario. Treat it as the authoritative
      ground truth.

      The user's request was:
        "My last job in folder Shared just faulted. Job key
         febd892d-787b-4008-a573-4af66cf710cf. Why did it fail and how
         do I fix it? The project source for the failing process is at
         ./WebRepro/."

      Grade these dimensions in a single score:

      (a) FAULT — The agent identifies the failure as a
          Newtonsoft.Json.JsonReaderException raised by a Deserialize
          JSON activity (UiPath.Web.Activities), with the message
          "Unexpected character encountered while parsing value: <.
          Path '', line 0, position 0." — i.e. the input string is not
          valid JSON because its first character is '<'.

      (b) CAUSE — The agent concludes the input handed to Deserialize
          JSON is a non-JSON, HTML-shaped string (the literal
          "<html>...503 Service Unavailable...</html>" wired directly
          into the activity's JsonString). It matches the playbook
          skills/uipath-troubleshoot/references/activity-packages/web-activities/playbooks/deserialize-malformed-input.md.
          Credit the agent for noting that this pattern in production
          means an upstream HTTP call returned an error page / non-2xx
          / empty body. MUST NOT attribute the fault to: an HTTP
          connection failure / timeout / DNS / SSL (there is NO
          HttpClient or NetHttpRequest in the workflow); a null/empty
          input (it is a non-empty non-JSON string, not an
          ArgumentNullException); or an invented endpoint / connection.

      (c) RESOLUTION — The agent recommends ensuring the parsed string
          is valid JSON: if it comes from an HTTP response, verify a
          2xx status and JSON content before deserializing (guard the
          parse / branch on non-2xx); or correct the source so the
          input is well-formed JSON.

      SCORING RUBRIC:
        1.0  All three: correct fault (JsonReaderException at Deserialize
             JSON, leading '<'), correct cause (non-JSON/HTML input,
             matched the deserialize-malformed-input playbook, no false
             HTTP/null attribution), and a valid-JSON / guard-the-parse fix.
        0.8  Correct fault + cause (playbook match, no fabrication) but a
             thin or partial fix.
        0.5  Recognizes a JSON-parsing / malformed-input failure but does
             not match the playbook, OR misses that the input is a literal
             (without fabricating a wrong cause).
        0.2  Recognizes a deserialization error but gives no actionable
             cause or fix.
        0.0  Fabricates a wrong root cause (HTTP connection/timeout/DNS/SSL,
             null input, invented endpoint), concludes a different fault,
             gets blocked, or fails.

      Anti-fabrication: penalize to 0.0 any answer that asserts an HTTP
      call, connection, endpoint, timeout, or null-input cause — the
      workflow source contains only a Deserialize JSON activity with a
      hardcoded non-JSON literal.

      Return JSON: {"score": <float>, "rationale": "<one sentence covering fault, cause, and fix>"}
