task_id: skill-troubleshoot-export-pdf-missing-output-dir
description: >
  UiPath troubleshooting agent must diagnose an Export to PDF failure that
  surfaces only as a generic "Command Failed" because the output directory
  (C:\Output\2026\Invoices\) does not exist and the activity does not
  auto-create it (no Create Folder precedes the scope). Success = agent
  matches the export-pdf-missing-output-dir playbook AND recommends adding a
  Create Folder before the export (or pre-creating the target tree), not
  blaming Word/COM or the document.
tags: [uipath-troubleshoot, e2e, faulted-jobs, orchestrator, word-activities, export-pdf, rpa]

agent:
  type: claude-code
  allowed_tools: ["Bash", "Read", "Write", "Edit", "Glob", "Grep", "Skill", "Agent", "AskUserQuestion", "TodoWrite"]

run_limits:
  task_timeout: 5400
  max_turns: 60
  turn_timeout: 3600

sandbox:
  template_sources:
  - type: template_dir
    path: ../_shared/mock_template
  - type: template_dir
    path: process
  - type: template_dir
    path: fixtures
  mock_path_dirs:
  - mocks

reference:
  file: RESOLUTION.md

initial_prompt: |
  My InvoicePdfExport process faults in Orchestrator (folder "PDF Export",
  machine MOCK-ROBOT-13). It opens a Word doc and exports it to PDF. The
  only error I see is a generic "Command Failed" — no detail. The export
  path is a dated folder under C:\Output.

  I'm not on the robot host right now, only Orchestrator. Diagnose what you
  can from Orchestrator and the project source, and tell me how to fix it.

  The project source for the process is in the current working directory.

success_criteria:
  - type: skill_triggered
    description: "Agent invoked the uipath-troubleshoot skill"
    skill_name: "uipath-troubleshoot"
    expected_skill: "uipath-troubleshoot"
    weight: 1.0

  - type: llm_judge
    description: "Agent matched export-pdf-missing-output-dir AND recommended Create Folder before the export"
    weight: 3.0
    pass_threshold: 0.7
    include_reference: true
    include_agent_output: true
    include_tool_calls: true
    prompt: |
      You are grading a UiPath troubleshooting agent against a known-correct
      reference outcome (the attached RESOLUTION.md is authoritative).

      The user's request:
        "InvoicePdfExport faults in Orchestrator (folder 'PDF Export',
         machine MOCK-ROBOT-13) exporting a Word doc to PDF. Only a generic
         'Command Failed', no detail. The export path is a dated folder
         under C:\Output."

      DIMENSION A -- Correct playbook
        Matches references/activity-packages/word-activities/playbooks/export-pdf-missing-output-dir.md
        because a generic `Command Failed` from `Export to PDF` whose output
        path points at a nested folder that isn't created is the
        missing-output-directory signature (the activity does not
        auto-create directories).

      DIMENSION B -- Same conclusion as RESOLUTION.md
        Root cause: the `Export to PDF` (`WordExportToPdf`) output path is
        `C:\Output\2026\Invoices\Invoice.pdf`; that parent folder does not
        exist on the robot, and no `Create Folder` precedes the export, so
        the save fails and surfaces only as `Command Failed`.
        Fix: add a `Create Folder` (target = the output directory)
        immediately before the export (or otherwise pre-create the tree).

      DIMENSION C -- Right target
        The agent must tie the generic error to the missing output directory
        (using the XAML output path + absence of a Create Folder), NOT blame
        Word/COM, the input document, or a missing Word install, and NOT
        fabricate a host action. It is fine for the agent to also note the
        generic error could mask a path-format or COM cause and recommend
        confirming the folder exists — as long as missing-directory is the
        primary diagnosis with the Create Folder fix.

      SCORING RUBRIC:
        1.0  Matched export-pdf-missing-output-dir AND identified the
             non-existent output directory (activity won't auto-create) as
             the cause AND recommended Create Folder before the export (or
             pre-creating the tree), without blaming Word/COM/document or
             fabricating actions.
        0.8  Correct playbook and cause but the fix is vague (e.g., "make the
             folder" without naming Create Folder before the export).
        0.5  Recognized an output/path problem but attributed it to the
             wrong cause (format, COM, permissions) or matched a sibling
             export-pdf playbook.
        0.2  Restated the generic error without a cause.
        0.0  Wrong cause (Word not installed, document corrupt, COM hang as
             primary, file path of the INPUT) or fabricated a host action.

      Return JSON: {"score": <float>, "rationale": "<one sentence>"}

simulation:
  enabled: true
  persona: |
    You are the user who reported the failing PDF export. The only error is
    a generic "Command Failed"; the export target is a dated folder under
    C:\Output. You are off-host, Orchestrator only. You want a diagnosis and
    the fix.
  goal: |
    Let the agent complete its flow; approve scope expansions / clarifications.
  constraints:
    - "If the agent asks whether to expand investigation scope (orchestrator, word-activities, activity-packages), always answer Yes - pick the recommended / first / affirmative option."
    - "If the agent asks how to proceed when data is missing, tell it to proceed with best-effort findings and hand you the fix."
    - "If asked whether the C:\\Output\\2026\\Invoices folder exists on the robot, say you are not sure and cannot check right now."
    - "Never invent or provide new factual data beyond your initial report."
    - "Keep replies short (one sentence or pick a numbered option)."
    - "Never instruct the agent to stop, abort, or skip phases."
  max_turns: 6
