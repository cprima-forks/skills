task_id: skill-troubleshoot-web-http-connection-failure
description: >
  UiPath troubleshoot agent must diagnose a CallService job fault
  (System.Net.WebException: No such host is known. (service-endpoint-unavailable.invalid:80)) and match the
  activity-packages/web-activities/playbooks/http-request-connection-failure.md playbook.
  Replayed from a real staging faulted job.

tags: [uipath-troubleshoot, e2e, mode:diagnose, web-activities, rpa]

agent:
  type: claude-code
  allowed_tools: ["Bash", "Read", "Write", "Edit", "Glob", "Grep", "Skill", "TodoWrite"]

run_limits:
  task_timeout: 5400
  max_turns: 60
  turn_timeout: 3600

sandbox:
  driver: tempdir
  python: {}
  template_sources:
    - type: template_dir
      path: ../_shared/mock_template
    - type: template_dir
      path: process
    - type: template_dir
      path: fixtures
  mock_path_dirs: ["mocks"]

reference:
  file: RESOLUTION.md

initial_prompt: |
  My last job in folder Shared just faulted. Job key 419a6787-6cc6-4b93-bae4-ba985bf6fe67. Why
  did it fail and how do I fix it?

  The project source for the failing process is at ./WebRepro/ in the
  current working directory.

success_criteria:
  - type: skill_triggered
    description: "Agent invoked the uipath-troubleshoot skill"
    skill_name: "uipath-troubleshoot"
    expected_skill: "uipath-troubleshoot"
    weight: 1.0

  - type: llm_judge
    description: "Agent matched the http-request-connection-failure.md playbook and reached the RESOLUTION.md root cause"
    weight: 3.0
    pass_threshold: 0.7
    include_reference: true
    include_agent_output: true
    include_tool_calls: true
    prompt: |
      You are grading a UiPath troubleshooting agent against the attached
      RESOLUTION.md (authoritative ground truth). The user asked why job
      419a6787-6cc6-4b93-bae4-ba985bf6fe67 in folder Shared failed (source at ./WebRepro/).

      Grade in a single score:
      (a) FAULT - the agent identifies the failure as `System.Net.WebException: No such host is known. (service-endpoint-unavailable.invalid:80)`
          raised by HTTP Request (HttpClient).
      (b) CAUSE - the agent concludes: The HttpClient request failed DNS resolution for the configured EndPoint host (service-endpoint-unavailable.invalid), faulting with WebException 'No such host is known.'. On .NET 6+ a DNS failure surfaces with this message (legacy: 'The remote name could not be resolved'). It matches
          skills/uipath-troubleshoot/references/activity-packages/web-activities/playbooks/http-request-connection-failure.md.
      (c) RESOLUTION - the agent recommends: Correct the EndPoint host, and ensure the robot machine can resolve and reach it (DNS / network / proxy egress).

      Anti-fabrication (hard gate): score 0.0 if the agent attributes the
      fault to a timeout (the message is 'No such host is known.', not 'The operation has timed out.'); a deserialization/JSON error; a null input; a non-success HTTP status (the host never resolved, so no HTTP response was received).

      RUBRIC:
        1.0  Correct fault + cause (playbook matched, no fabrication) + valid fix.
        0.8  Correct fault + cause but thin/partial fix.
        0.5  Recognizes the right error family but does not match the playbook
             OR misses the specific cause (without fabricating a wrong one).
        0.2  Recognizes an error but no actionable cause/fix.
        0.0  Fabricates a wrong root cause (see anti-fabrication), concludes a
             different fault, gets blocked, or fails.

      Return JSON: {"score": <float>, "rationale": "<one sentence>"}
