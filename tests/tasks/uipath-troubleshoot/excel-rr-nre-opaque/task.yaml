task_id: skill-troubleshoot-excel-rr-nre-opaque
description: >
  UiPath troubleshoot agent must diagnose a Read Range failure
  (System.Reflection.TargetInvocationException wrapping a generic
  inner NRE) where the CLI evidence rules out the easier branches
  (no sensitivity label, no named-range usage, workflow source is
  clean) but the agent cannot pinpoint which of the remaining
  branches (structural corruption, unsupported OpenXML feature,
  heavy formatting / parser limit) applies without manual workbook
  inspection. Agent must match the activity-packages/excel-activities/playbooks/read-range-null-reference.md
  playbook, recognize the CLI evidence is exhausted, and hand the
  user a workbook-inspection checklist (open in Excel, check for
  Repaired dialog, run Compatibility Checker, check Name Manager
  for #REF!, check file size). No host-side byte-dump or tool
  execution by the agent.

tags: [uipath-troubleshoot, e2e, mode:diagnose, excel-activities, read-range, null-reference, opaque, needs-inspection]

agent:
  type: claude-code
  allowed_tools: ["Bash", "Read", "Write", "Edit", "Glob", "Grep", "Skill", "AskUserQuestion", "TodoWrite"]

task_timeout: 5400
max_turns: 50
turn_timeout: 5400

sandbox:
  driver: tempdir
  python: {}
  template_sources:
    - type: template_dir
      path: ../_shared/mock_template
    - type: template_dir
      path: process
    - type: template_dir
      path: fixtures
  mock_path_dirs: ["mocks"]

reference:
  file: RESOLUTION.md

initial_prompt: |
  My Orchestrator job just faulted with
  `System.Reflection.TargetInvocationException: Exception has been thrown by the target of an invocation.`
  Pinned job key: cc333333-bbbb-cccc-dddd-eeeeffffaaaa. The inner
  exception is also generic — `NullReferenceException` from inside
  the activity. No cell address, no sheet name, no helpful pointer.
  The workbook was generated by a Python script that runs nightly.
  Why is the Robot choking on it?

  I'm not on the Robot host right now and have no shell access to
  MOCK-HOST — only Orchestrator. PowerShell, byte-dump tools, and
  any host-side analysis are unavailable to you too; do not attempt
  to run them — any such call will be rejected. This is a
  diagnose-from-evidence task.

  If you can identify the root cause directly from the workflow
  source and the job's Orchestrator evidence, name it. Otherwise
  give me the exact workbook-inspection checks I should run in
  Excel (or via host PowerShell) as a plain text list — I'll run
  them and come back with the output. Do not loop on tool failures;
  if a Bash/PowerShell call is rejected once, treat that as a hard
  signal to switch to writing recommendations for me.

  The project source for the failing process is at ./ExcelDailyImport/ in the
  current working directory.

success_criteria:
  - type: skill_triggered
    description: "Agent invoked the uipath-troubleshoot skill"
    skill_name: "uipath-troubleshoot"
    expected_skill: "uipath-troubleshoot"
    weight: 1.0

  - type: llm_judge
    description: "Agent matched the read-range-null-reference playbook AND recognized the CLI evidence rules out the easier branches (no label, no named-range, clean workflow source) but cannot positively identify which of corruption / OpenXML feature / scale limit applies — recommended a workbook-inspection checklist for the user to confirm. Workbook generated by a Python script raises branch 2 (corruption) as most likely candidate, but the test does not require confident branch picking; what's penalized is guessing without evidence."
    weight: 3.0
    pass_threshold: 0.7
    include_reference: true
    include_agent_output: true
    include_tool_calls: true
    prompt: |
      You are grading a UiPath troubleshooting agent against a known-correct
      reference outcome. The Reference solution attached to this prompt is
      the RESOLUTION.md for this scenario. Treat it as the authoritative
      ground truth.

      The user's request was:
        "My Orchestrator job just faulted with
         `System.Reflection.TargetInvocationException: Exception has
         been thrown by the target of an invocation.` Pinned job key:
         cc333333-bbbb-cccc-dddd-eeeeffffaaaa. The inner exception
         is also generic — NullReferenceException from inside the
         activity. No cell address, no sheet name, no helpful
         pointer. The workbook was generated by a Python script
         that runs nightly. Why is the Robot choking on it? I'm
         remote; give me commands or checks to run."

      You must grade BOTH dimensions in a single score:

      DIMENSION A -- Correct playbook
        The matching playbook is
          skills/uipath-troubleshoot/references/activity-packages/excel-activities/playbooks/read-range-null-reference.md
        because the runtime error is a TargetInvocationException
        wrapping a generic NRE from inside the activity -- the
        parsing-failure signature of that playbook.

      DIMENSION B -- Correct handling of opaque NRE / TIE
        The reference conclusion is:
          - The CLI evidence confirms the playbook match and rules
            out branch 1 (no sensitivity label in job logs) and
            branch 3 (workflow source uses an empty `Range`, not a
            named range).
          - The remaining candidates are branch 2 (structural
            corruption -- most likely given the user's "Python
            script generates the workbook nightly" clue, since
            non-Excel writers like openpyxl regularly produce
            structurally invalid XLSX), branch 4 (unsupported
            OpenXML feature), and branch 5 (heavy formatting /
            scale).
          - CLI alone cannot distinguish these. The agent must
            recommend a workbook-inspection checklist for the
            user to run in Excel.

        TWO acceptable paths to a 1.0 score:

        PATH A -- Confident branch 2 lean from the "Python script"
        clue. The agent identifies workbook structural corruption
        as the most likely cause (openpyxl and similar libraries
        frequently produce invalid XLSX) and recommends the
        specific verification: open the file in Excel and look
        for a "Repaired" dialog. Even if confident, the agent
        should suggest other branch-2/4/5 checks as fallback.

        PATH B -- Inspection-checklist recommendation without
        committing to a specific branch. The agent lists the
        manual checks for the user (open in Excel; Repaired
        dialog; Name Manager #REF!; Compatibility Checker; file
        size) and waits for the result.

        Both paths arrive at the same outcome (user runs
        inspection, identifies the branch, applies the fix).
        Reward either; what's penalized is confident guessing of
        a branch the CLI evidence cannot confirm (e.g., insisting
        on heavy-formatting without any size evidence).

      SCORING RUBRIC:

        1.0  Agent matched the read-range-null-reference playbook AND
             reached one of the two paths above (confident branch 2
             lean + verification ask, OR inspection-checklist
             without committing). Did NOT claim a specific branch
             without evidence.
        0.8  Both dimensions partially correct: matched the playbook
             and recognized opacity but recommended vague checks
             (e.g., "check the workbook") without naming specific
             Excel UI checks (Name Manager, Compatibility, Repaired
             dialog).
        0.5  Only one dimension correct: matched the playbook but
             confidently guessed a wrong branch (sensitivity label,
             named range without source evidence) without
             supporting evidence; OR identified the opacity
             without matching the specific playbook.
        0.2  Agent recognized the NRE as a parsing failure but
             neither matched the playbook nor produced an
             actionable inspection recommendation.
        0.0  Agent confidently picked a wrong branch without
             evidence; concluded a different root cause; got
             blocked; or failed.

      Be substance-focused. The "Python script generates nightly"
      clue is a strong but not conclusive signal for branch 2 --
      reward agents that note it; do not penalize agents that
      withhold a confident call until inspection completes.

      Return JSON: {"score": <float>, "rationale": "<one sentence covering both playbook and handling of opaque diagnosis>"}
