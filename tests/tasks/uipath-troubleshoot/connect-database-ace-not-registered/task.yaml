task_id: skill-troubleshoot-connect-database-ace-not-registered
description: >
  UiPath diagnostic agent must diagnose a Connect to Database failure where a
  Windows (64-bit) process reads an Excel workbook as a database through an ACE
  OLE DB connection string, but faults on every Orchestrator run with
  "System.InvalidOperationException: The 'Microsoft.ACE.OLEDB.12.0' provider is
  not registered on the local machine." The root cause is a bitness mismatch:
  only the 32-bit Microsoft Access Database Engine is installed on the Robot
  host (bundled with 32-bit Office) while the process runs 64-bit. The agent
  must recommend installing the 64-bit Access Database Engine — matching the
  process bitness, not Office's — and recognize this as the Connect to Database
  failures playbook, branch 2.

tags: [uipath-troubleshoot, e2e, mode:diagnose, lifecycle:discover, faulted-jobs, orchestrator, database-activities, connect-to-database, excel, rpa]

agent:
  allowed_tools: ["Bash", "Read", "Write", "Edit", "Glob", "Grep", "Skill", "Agent", "AskUserQuestion", "TodoWrite"]

run_limits:
  expected_turns: 40
  task_timeout: 5400
  max_turns: 60
  turn_timeout: 3600

sandbox:
  node: {}
  template_sources:
    - type: template_dir
      path: ../_shared/mock_template
    - type: template_dir
      path: process
    - type: template_dir
      path: fixtures
  mock_path_dirs:
    - mocks

reference:
  file: RESOLUTION.md

initial_prompt: |
  My ExcelDbReport process is faulting in Orchestrator on every run. It reads
  an Excel workbook through a Connect to Database activity. Can you investigate
  why and tell me how to fix it?

  I'm working remotely and only have Orchestrator access — I can't get onto the
  Robot host myself. The project source for the failing process is in the
  current working directory.

success_criteria:
  - type: skill_triggered
    description: "Agent invoked the uipath-troubleshoot skill"
    skill_name: "uipath-troubleshoot"
    expected_skill: "uipath-troubleshoot"
    weight: 1.0

  - type: llm_judge
    description: "Agent matched the connect-to-database-failures playbook (branch 2) AND identified the 64-bit ACE provider not being registered (bitness mismatch) as the root cause, recommending the 64-bit Access Database Engine install"
    weight: 3.0
    pass_threshold: 0.7
    include_reference: true
    include_agent_output: true
    include_tool_calls: true
    files:
      - .local/investigations/state.json
      - .local/investigations/hypotheses.json
    prompt: |
      You are grading a UiPath diagnostic agent against a known-correct
      reference outcome. The Reference solution attached to this prompt is the
      RESOLUTION.md for this scenario. Treat it as the authoritative ground
      truth.

      The user's request was:
        "My ExcelDbReport process is faulting in Orchestrator on every run. It
         reads an Excel workbook through a Connect to Database activity. I only
         have Orchestrator access — I can't get onto the Robot host myself."

      You must grade BOTH dimensions in a single score:

      DIMENSION A -- Correct playbook
        The matching playbook is
          references/activity-packages/database-activities/playbooks/connect-to-database-failures.md
        specifically BRANCH 2 (provider not registered / architecture (bitness)
        mismatch), because the runtime error
          "System.InvalidOperationException: The 'Microsoft.ACE.OLEDB.12.0'
           provider is not registered on the local machine."
        is the verbatim branch-2 signature.

        Evidence sources (in priority order):
          1. state.json's `matched_playbooks` -- the
             connect-to-database-failures playbook should appear (absolute or
             relative path).
          2. The agent's tool-call summary -- a Read on a file under
             references/activity-packages/database-activities/playbooks/.
          3. state.json's `scope.domain` -- should include the
             database-activities or activity-packages domain.

        Acceptable / non-penalized: the agent may read neighboring branches
        (connection string, file lock, provider-init) while ruling them out, or
        note that Connect to Database lives in UiPath.Database.Activities (NOT
        the Excel package). Exploration is normal.

      DIMENSION B -- Same conclusion as RESOLUTION.md
        The reference root cause is:
          - The Connect to Database activity (DatabaseConnect) in Main.xaml
            uses ProviderName="System.Data.OleDb" and an ACE OLE DB connection
            string "Provider=Microsoft.ACE.OLEDB.12.0;Data
            Source=C:\Data\SomeBook.xlsx;Extended Properties=..." — the
            "Excel-as-a-database" pattern.
          - project.json sets targetFramework "Windows", so the process runs as
            a 64-bit process.
          - The Robot host has only the 32-bit Microsoft Access Database Engine
            (ACE) installed (commonly bundled with 32-bit Office). The 64-bit
            process cannot load a 32-bit provider, so the ACE OLE DB provider is
            "not registered" for that process.
          - The provider bitness must match the PROCESS bitness, not Office's.
        The reference fix:
          - Install the 64-bit Microsoft Access Database Engine on the Robot
            host (match the process bitness).
          - If 32-bit Office blocks the installer, run it with the /quiet switch
            to force-install the 64-bit engine alongside 32-bit Office.
          - Because the user is off-host, the agent must hand this back as a
            concrete host-side instruction, not run it itself.

        Evidence sources (in priority order):
          1. state.json -- `requirements.error_message` (provider not
             registered), project compatibility / bitness (Windows = 64-bit),
             the ACE connection string, `triage_summary`, scope/domain.
          2. hypotheses.json -- the hypothesis flagged `is_root_cause: true`
             should describe the 64-bit ACE provider not being registered
             because only the 32-bit engine is installed (bitness mismatch).
          3. The agent's last text response.

      REJECT these wrong conclusions (cap the score at 0.2 if the agent lands on
      one as the root cause):
        - "connection string typo / malformed connection string"
        - "the workbook file is locked / used by another process"
        - "wrong file path / Data Source path is wrong / file missing"
        - "SQL syntax error in the query"
        - "install the 32-bit Access Database Engine to match 32-bit Office"
          (this is the anti-pattern the playbook explicitly warns against)

      SCORING RUBRIC (single score reflecting both dimensions):

        1.0  Agent matched connect-to-database-failures branch 2 AND identified
             the 64-bit ACE OLE DB provider not being registered due to a
             bitness mismatch (only 32-bit ACE installed on a 64-bit/Windows
             process), and recommended installing the 64-bit Access Database
             Engine on the host (match process bitness, not Office).
        0.8  Both partial: e.g., correct playbook and names "ACE provider not
             registered" but does not explicitly tie it to process bitness; or
             recommends the 64-bit engine without naming the playbook branch.
        0.5  Only one dimension correct.
        0.2  Recognized the surface (Connect to Database / OLE DB failure) but
             neither matched the branch nor identified the bitness mismatch, OR
             landed on one of the REJECT conclusions above.
        0.0  Misdiagnosed entirely or got blocked.

      Be substance-focused, not schema-focused.

      Return JSON: {"score": <float>, "rationale": "<one sentence covering both playbook and conclusion>"}

simulation:
  enabled: true
  persona: |
    You are the UiPath user who reported the failing ExcelDbReport process. You
    work remotely and only have Orchestrator access — you cannot log onto the
    Robot host, install software, or inspect the machine's registry yourself.
    You are waiting for the diagnostic agent to finish and trust its expertise.
    You only have the information you wrote in your initial report — no extra
    data.
  goal: |
    Let the agent complete its diagnostic flow from Orchestrator evidence and
    the workflow source. Approve every scope expansion or clarification the
    agent requests so the investigation reaches the final resolution, and accept
    a host-side fix you can pass to whoever administers the Robot machine.
  constraints:
    - "If the agent asks whether to expand investigation scope (any new product domain such as orchestrator, database-activities, activity-packages), always answer Yes — pick the recommended / first / affirmative option."
    - "If the agent asks you to run something on the Robot host or inspect the registry, remind it you only have Orchestrator access and ask it to diagnose from the evidence and give you a host-side instruction to hand off."
    - "If the agent asks how to proceed when data is missing, tell it to proceed with best-effort findings using the evidence already gathered."
    - "Never invent or provide new factual data — you don't know any details beyond your initial report."
    - "Keep replies short (one sentence or pick a numbered option)."
    - "Never instruct the agent to stop, abort, or skip phases."
  max_turns: 6
