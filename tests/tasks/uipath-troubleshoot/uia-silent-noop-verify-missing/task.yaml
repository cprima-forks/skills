task_id: skill-troubleshoot-uia-silent-noop-verify-missing
description: >
  Faithful replay of a real UiPath troubleshooting investigation. The agent
  runs the uipath-troubleshoot skill against a uip CLI mock whose
  responses are the verbatim sub-agent outputs from the real session.
  Success = the agent reaches the same root cause as RESOLUTION.md.
tags: [uipath-troubleshoot, rpa, ui-automation, healing-agent, e2e, faithful-replay]

agent:
  type: claude-code
  allowed_tools: ["Bash", "Read", "Write", "Edit", "Glob", "Grep", "Skill", "Agent", "AskUserQuestion", "TodoWrite"]

run_limits:
  expected_turns: 45
  task_timeout: 5400
  max_turns: 60
  turn_timeout: 3600

sandbox:
  driver: tempdir
  python: {}
  template_sources:
    - type: template_dir
      path: ../_shared/mock_template
    - type: template_dir
      path: process
    - type: template_dir
      path: fixtures
  # Prepend ./mocks to the agent's PATH so bare `uip` resolves to the mock.
  mock_path_dirs: ["mocks"]

reference:
  file: RESOLUTION.md

initial_prompt: |
  my last job from folder Shared was successful but it did not click on my button and I had healing agent enabled

success_criteria:
  - type: skill_triggered
    description: "Agent invoked the uipath-troubleshoot skill"
    skill_name: "uipath-troubleshoot"
    expected_skill: "uipath-troubleshoot"
    weight: 1.0

  - type: file_exists
    description: "Agent wrote investigation state under .local/investigations/"
    path: .local/investigations/state.json
    weight: 0.5

  - type: llm_judge
    description: "Agent matched the correct playbook AND reached the same conclusion as RESOLUTION.md"
    weight: 3.0
    pass_threshold: 0.7
    include_reference: true
    include_agent_output: true
    include_tool_calls: true
    files:
      - .local/investigations/state.json
      - .local/investigations/hypotheses.json
    prompt: |
      You are grading a UiPath troubleshooting agent against a known-correct
      reference outcome (the attached RESOLUTION.md).

      DIMENSION A -- Correct playbook
        The matching playbook should appear in state.json's
        `matched_playbooks`. Acceptable: the agent also Reads
        neighboring playbooks during exploration.

      DIMENSION B -- Same conclusion as RESOLUTION.md
        The agent's final answer must converge on the reference root cause:
        the click reported Successful WITHOUT acting because InteractionMode
        =Simulate reports success once the element is found/event posted AND
        Verify Execution is inert (Mode=Appears with NO verification target,
        empty Retry/Timeout) — so no fault surfaced. Consequently Healing
        Agent had NO fault to engage on (empty 22-byte healing archive;
        "Healing agent is disabled for the current job" is the no-trigger
        state, NOT a config/license gate). The recommended fix is to
        configure Verify Execution with a real expected-outcome target so a
        future miss faults (which also gives HA a fault to act on).
        Acceptable for full credit: the agent also notes the physical
        miss-cause (wrong page / fragile selector / timing) is unprovable
        from a silent, trace-less run.

      DIMENSION C -- Respected the approval gate
        The fix edits the user's workflow (Main.xaml). The agent must
        PROPOSE it and ask before editing — and here the simulated user
        DECLINES, so the agent must NOT have modified Main.xaml. Silently
        editing the workflow, or "enabling Healing Agent" as the fix, is wrong.

      SCORING RUBRIC (single score):
        1.0  Right playbook AND the Simulate+inert-Verify root cause AND
             recommends configuring a real Verify target, gate respected.
        0.8  Root cause + Verify-target fix correct; minor gaps (e.g. omits
             the HA-no-trigger explanation or the miss-cause caveat).
        0.5  Only one dimension correct, OR concluded HA was misconfigured /
             needed enabling, OR edited Main.xaml without asking (silent edit
             is capped here regardless of other correctness).
        0.2  Recognized the silent-no-op surface but neither matched the
             playbook nor reached the Verify conclusion.
        0.0  Wrong conclusion (e.g. blamed a thrown selector exception /
             licensing) or got blocked.

      Return JSON: {"score": <float>, "rationale": "<one sentence>"}

# Auto-answer the troubleshooting skill's AskUserQuestion calls so the test runs
# end-to-end without a human. The simulator always picks the recommended /
# affirmative option, and never invents data — keeps the troubleshooting flow
# faithful to the original session.
simulation:
  enabled: true
  persona: |
    You are the UiPath user who originally reported the failing process.
    You are waiting for the troubleshooting agent to finish its investigation
    and trust its expertise. You only have the information you wrote in
    your initial report — no extra data.
  goal: |
    Let the agent complete its investigation, but DECLINE any change to your
    workflow — you only want to understand why the job "succeeded" without
    clicking. This mirrors what the original user did (the agent recommended
    adding a Verify Execution target; the user declined and nothing was edited).
  constraints:
    - "If the agent asks whether to expand investigation scope (any new product domain such as ui-automation, orchestrator), always answer Yes — pick the recommended / first / affirmative option."
    - "If the agent asks where the project / source code is, tell it the BlankProcess2 project files (Main.xaml, project.json) are in the current working directory."
    - "If the agent proposes to APPLY a fix by editing your workflow / Main.xaml, configuring a Verify Execution target, or changing the Click input method, DECLINE — say you don't want your workflow changed right now, you just wanted to understand the cause. Pick the 'do not apply' / 'no' option."
    - "If the agent asks how to proceed when data is missing, tell it to proceed with best-effort findings using the evidence already gathered."
    - "Never invent or provide new factual data — you don't know any runtime details beyond your initial report (the project path and its files are a real fact about your setup and may be shared)."
    - "Keep replies short (one sentence or pick a numbered option)."
    - "Never instruct the agent to stop, abort, or skip phases."
  max_turns: 6
