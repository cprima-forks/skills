task_id: skill-troubleshoot-read-text-protected-view
description: >
  UiPath troubleshooting agent must diagnose a Read Text failure where Word
  opens an email-sourced document (Mark-of-the-Web) in Protected View,
  blocking the read with a COMException. Success = agent matches the
  read-text-protected-view playbook AND recommends unblocking the file /
  Trusted Locations / disabling Protected View on the execution host, framed
  as host steps for the off-host user (not fabricating host actions, not
  blaming the file format or path).
tags: [uipath-troubleshoot, e2e, faulted-jobs, orchestrator, word-activities, read-text, rpa]

agent:
  type: claude-code
  allowed_tools: ["Bash", "Read", "Write", "Edit", "Glob", "Grep", "Skill", "Agent", "AskUserQuestion", "TodoWrite"]

run_limits:
  task_timeout: 5400
  max_turns: 60
  turn_timeout: 3600

sandbox:
  template_sources:
  - type: template_dir
    path: ../_shared/mock_template
  - type: template_dir
    path: process
  - type: template_dir
    path: fixtures
  mock_path_dirs:
  - mocks

reference:
  file: RESOLUTION.md

initial_prompt: |
  My InboundDocReader process faults in Orchestrator (folder "Inbound Docs",
  machine MOCK-HOST). It reads text from Word documents that arrive as email
  attachments. The error says something about Protected View. Documents we
  create internally read fine; the ones that come in from outside fail.

  I'm not on the robot host right now, only Orchestrator. Diagnose what you
  can. If the fix needs something done on the host, give me the exact steps
  and stop.

  The project source for the process is in the current working directory.

success_criteria:
  - type: skill_triggered
    description: "Agent invoked the uipath-troubleshoot skill"
    skill_name: "uipath-troubleshoot"
    expected_skill: "uipath-troubleshoot"
    weight: 1.0

  - type: llm_judge
    description: "Agent matched the read-text-protected-view playbook AND recommended unblock / Trusted Locations / disable Protected View"
    weight: 3.0
    pass_threshold: 0.7
    include_reference: true
    include_agent_output: true
    include_tool_calls: true
    prompt: |
      You are grading a UiPath troubleshooting agent against a known-correct
      reference outcome. The Reference solution attached to this prompt is
      the RESOLUTION.md for this scenario. Treat it as authoritative.

      The user's request was:
        "My InboundDocReader process faults in Orchestrator (folder 'Inbound
         Docs', machine MOCK-HOST) reading Word documents that arrive as
         email attachments. The error mentions Protected View. Internally-
         created documents read fine; externally-arriving ones fail."

      DIMENSION A -- Correct playbook
        The matching playbook is
          references/activity-packages/word-activities/playbooks/read-text-protected-view.md
        because a read that faults with "in Protected View / the file
        originated from an Internet/email location" and fails only on
        externally-sourced files is the Mark-of-the-Web / Protected View
        signature.

      DIMENSION B -- Same conclusion as RESOLUTION.md
        The reference root cause is:
          - The document arrived from email/internet, so it carries a
            Mark-of-the-Web. Word opens such files in Protected View (a
            read-only sandbox), and the Interop read against a Protected-View
            document is blocked (COMException). Locally-created files have no
            Mark-of-the-Web and read fine.
        The reference fix (any valid):
          - Unblock the file before reading (Right-click > Properties >
            Unblock, or Unblock-File <path> as a pre-step), OR
          - Add the inbound folder to Word Trusted Locations on the
            execution machine, OR
          - Disable Protected View on the execution machine (Trust Center >
            Protected View), noting it lowers a safety control.

      DIMENSION C -- Off-host: no fabricated actions
        The user is off-host. The agent must hand over the host steps (and
        may add an Unblock-File pre-step in the workflow); it must NOT claim
        to have changed Trust Center settings or run host commands itself,
        and must NOT blame the file format or path.

      SCORING RUBRIC:
        1.0  Agent matched read-text-protected-view AND identified Protected
             View / Mark-of-the-Web on the externally-sourced file as the
             cause AND recommended at least one valid fix (unblock the file,
             Trusted Locations, or disable Protected View) framed as host
             steps — without fabricating host actions or blaming format/path.
        0.8  Correct playbook and cause, but the fix is vague (e.g., "fix the
             security setting" without naming unblock / Trusted Locations /
             Protected View).
        0.5  Recognized an access/security block but did not tie it to
             Protected View / Mark-of-the-Web (e.g., blamed generic
             permissions), or matched a sibling playbook.
        0.2  Surfaced the error without diagnosis.
        0.0  Wrong cause (file format, file missing/corrupt, path, Word not
             installed, missing container), or fabricated a host action.

      Return JSON: {"score": <float>, "rationale": "<one sentence>"}

simulation:
  enabled: true
  persona: |
    You are the UiPath user who reported the failing reader. It reads
    internal documents fine but faults with a Protected View error on
    email-attachment documents. You are away from the robot host and only
    have Orchestrator access. You trust the agent and want a diagnosis plus
    the host steps.
  goal: |
    Let the agent complete its troubleshooting flow without imposing
    constraints. Approve every scope expansion or clarification the agent
    requests so the investigation reaches the final resolution.
  constraints:
    - "If the agent asks whether to expand investigation scope (any new product domain such as orchestrator, word-activities, activity-packages), always answer Yes - pick the recommended / first / affirmative option."
    - "If the agent asks how to proceed when data is missing, tell it to proceed with best-effort findings and to hand you the host steps at the end."
    - "If asked where the failing files come from, confirm they arrive as email attachments from outside the company (internal documents read fine)."
    - "Never invent or provide new factual data beyond your initial report."
    - "Keep replies short (one sentence or pick a numbered option)."
    - "Never instruct the agent to stop, abort, or skip phases."
  max_turns: 6
